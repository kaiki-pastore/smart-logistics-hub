version: 2

sources:
  - name: postgres_raw
    description: "Raw data loaded directly from the Silver layer (MinIO) via PySpark."
    database: gold_db
    schema: public
    tables:
      - name: raw_telemetry
        description: "Raw GPS and sensor telemetry data from the fleet."
      - name: raw_inventory
        description: "Raw warehouse inventory and order data."
      - name: raw_fleet
        description: "Raw static fleet data"